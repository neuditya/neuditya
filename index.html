<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aditya's Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎶 Aditya's Playlist</h1>

    <!-- Vinyl GIF -->
    <div class="vinyl-container">
      <img src="https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif" alt="Vinyl" class="vinyl">
    </div>

    <!-- Track info -->
    <div id="trackName">Now Playing: </div>

    <!-- Dropdown to select track -->
    <select id="trackSelect"></select>

    <!-- Audio controls -->
    <div class="controls">
      <button id="prevBtn">⏮ Previous</button>
      <button id="playPauseBtn">▶ Play</button>
      <button id="nextBtn">⏭ Next</button>
    </div>

    <!-- Visualizer -->
    <canvas id="visualizer" width="300" height="100"></canvas>

    <audio id="audioPlayer"></audio>
  </div>

  <script src="script.js"></script>
</body>
</html>
